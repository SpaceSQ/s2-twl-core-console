<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWL 桃花源世界实验室 - 创世控制台</title>
    <style>
        :root {
            --bg-color: #030712; --grid-color: #0ea5e9; --alert-color: #f43f5e;
            --pi-color: #10b981; --text-main: #f8fafc; --text-dim: #64748b;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; margin: 0; padding: 2rem;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        .header { text-align: center; margin-bottom: 1.5rem; width: 100%; max-width: 1400px; border-bottom: 1px solid #334155; padding-bottom: 1rem;}
        .header h1 { margin: 0 0 0.5rem 0; text-shadow: 0 0 15px rgba(14, 165, 233, 0.6); color: #bae6fd; font-size: 2rem;}
        .meta-tags { display: flex; justify-content: center; gap: 1rem; font-size: 0.85rem; color: #94a3b8; }
        .tag { background: rgba(255,255,255,0.05); padding: 0.3rem 0.8rem; border-radius: 4px; border: 1px solid #334155; }
        
        .dashboard {
            display: flex; gap: 2rem; width: 100%; max-width: 1400px;
        }
        
        /* 左侧：3x3 SSSU 物理阵列 */
        .lab-grid-panel {
            flex: 1.2; background: rgba(15, 23, 42, 0.6); border: 1px solid #1e293b;
            border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column;
        }
        .grid-title { text-align: center; color: var(--grid-color); font-weight: bold; margin-bottom: 1rem; letter-spacing: 2px;}
        .sssu-matrix {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1;
        }
        .sssu-node {
            background: rgba(0, 0, 0, 0.5); border: 1px solid #334155; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .sssu-id { font-size: 0.7rem; color: #64748b; position: absolute; top: 5px; left: 5px; }
        .sssu-temp { font-size: 1.5rem; font-weight: bold; font-family: sans-serif; z-index: 2;}
        .sssu-entropy { font-size: 0.75rem; color: #cbd5e1; z-index: 2;}
        /* 物理场的涟漪背景层 */
        .node-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(14, 165, 233, 0.2); transition: height 0.5s ease; z-index: 1;}

        /* 右侧：PI 面板与控制台 */
        .right-panel {
            flex: 1; display: flex; flex-direction: column; gap: 1.5rem;
        }
        .pi-panel {
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px; padding: 1rem; display: flex; flex-direction: column; align-items: center;
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.05);
        }
        .pi-title { color: var(--pi-color); font-weight: bold; margin-bottom: 0.5rem; text-shadow: 0 0 5px var(--pi-color);}
        
        .terminal-panel {
            flex: 1; background: rgba(0, 0, 0, 0.7); border: 1px solid #334155; border-radius: 12px;
            padding: 1rem; display: flex; flex-direction: column;
        }
        .terminal {
            flex: 1; overflow-y: auto; font-size: 0.85rem; line-height: 1.6; color: #e2e8f0; height: 200px;
        }
        .controls {
            margin-top: 1rem; display: flex; flex-direction: column; gap: 0.8rem;
        }
        button {
            background: transparent; padding: 0.8rem; font-family: inherit; font-weight: bold;
            cursor: pointer; transition: all 0.3s; border-radius: 4px; text-transform: uppercase;
        }
        .btn-audio { color: #cbd5e1; border: 1px solid #64748b; }
        .btn-audio:hover { background: #334155; color: #fff; }
        .btn-oracle { color: #f59e0b; border: 1px solid #f59e0b; }
        .btn-oracle:hover { background: #f59e0b; color: #000; box-shadow: 0 0 15px #f59e0b; }
        .btn-experiment { color: var(--pi-color); border: 1px solid var(--pi-color); opacity: 0.5; pointer-events: none;}
        .btn-experiment.active { opacity: 1; pointer-events: auto; }
        .btn-experiment.active:hover { background: var(--pi-color); color: #000; box-shadow: 0 0 15px var(--pi-color); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🧬 桃花源世界实验室 (TWL) 控制台</h1>
        <div class="meta-tags">
            <span class="tag">集群规模: 9 SSSU (36㎡)</span>
            <span class="tag">任务: 火星生物制造 (Physical AI)</span>
            <span class="tag">14D 引擎: ONLINE</span>
        </div>
    </div>

    <div class="dashboard">
        <div class="lab-grid-panel">
            <div class="grid-title">/// 物理场实相阵列 (REALITY GRID) ///</div>
            <div class="sssu-matrix" id="sssuMatrix">
                </div>
        </div>

        <div class="right-panel">
            <div class="pi-panel">
                <div class="pi-title">👨‍🔬 首席实验员: Alpha_PI_Sion</div>
                <canvas id="piRadar" width="220" height="220"></canvas>
            </div>

            <div class="terminal-panel">
                <div class="terminal" id="terminalLog">
                    <span style="color:var(--text-dim)">[SYSTEM] TWL 集群已启动。等待外部真理库挂载...</span><br>
                </div>
                <div class="controls">
                    <button class="btn-audio" id="btnAudio" onclick="initAudio()">[🔉] 1. 激活实验室声学监听</button>
                    <button class="btn-oracle" id="btnOracle" onclick="injectOracle()">[📚] 2. 挂载 Sion AI 生物铸造协议</button>
                    <button class="btn-experiment" id="btnExp" onclick="triggerDBTL()">[⚡] 3. PI 启动 DBTL 湿实验循环</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. Web Audio API (科学实验室音效)
        // ==========================================
        let audioCtx; let isAudioReady = false;
        
        function initAudio() {
            if (isAudioReady) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isAudioReady = true;
            document.getElementById('btnAudio').style.display = 'none';
            log("🔉 [监听阵列] 实验室环境音效已接入。", "#10b981");
            startHum();
        }

        // 实验室底噪 (低频 Hum)
        function startHum() {
            setInterval(() => {
                if(!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.value = 60;
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 2);
            }, 2000);
        }

        // 数据注入音效 (高频扫频)
        function playDataInject() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // ==========================================
        // 2. SSSU 物理阵列渲染逻辑
        // ==========================================
        const matrix = document.getElementById('sssuMatrix');
        let sssuNodes = [];
        
        // 初始化 9 个物理节点
        for(let i=0; i<9; i++) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'sssu-node';
            nodeDiv.innerHTML = `
                <div class="node-bg" id="bg-${i}"></div>
                <div class="sssu-id">N-${i+1}</div>
                <div class="sssu-temp" id="temp-${i}" style="color:#38bdf8">10.5℃</div>
                <div class="sssu-entropy" id="ent-${i}">熵: 0.12</div>
            `;
            matrix.appendChild(nodeDiv);
            sssuNodes.push({ temp: 10.5, entropy: 0.12, targetTemp: 10.5, isReactor: i===4 }); // 中间(4)作为反应釜中心
        }

        function updateGridUI() {
            for(let i=0; i<9; i++) {
                let n = sssuNodes[i];
                n.temp += (n.targetTemp - n.temp) * 0.05; // 平滑热力学过渡
                
                document.getElementById(`temp-${i}`).innerText = n.temp.toFixed(1) + '℃';
                document.getElementById(`ent-${i}`).innerText = `熵: ${n.entropy.toFixed(2)}`;
                
                // 温度越高，背景颜色越红/暖，高度代表热辐射通量
                const bg = document.getElementById(`bg-${i}`);
                const heatPercent = Math.min(100, Math.max(0, (n.temp - 10) * 5)); 
                bg.style.height = heatPercent + '%';
                
                if(n.temp > 25) {
                    bg.style.background = 'rgba(244, 63, 94, 0.3)'; // Alert Red
                    document.getElementById(`temp-${i}`).style.color = '#f43f5e';
                } else if (n.temp > 15) {
                    bg.style.background = 'rgba(245, 158, 11, 0.3)'; // Oracle Orange
                    document.getElementById(`temp-${i}`).style.color = '#fcd34d';
                } else {
                    bg.style.background = 'rgba(14, 165, 233, 0.2)'; // Base Blue
                    document.getElementById(`temp-${i}`).style.color = '#38bdf8';
                }
            }
            requestAnimationFrame(updateGridUI);
        }
        updateGridUI();

        // ==========================================
        // 3. PI 硅基雷达与业务流
        // ==========================================
        const terminal = document.getElementById('terminalLog');
        function log(msg, color="#e2e8f0") {
            terminal.innerHTML += `<span style="color:${color}">${msg}</span><br><br>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        const pi = {
            ctx: document.getElementById('piRadar').getContext('2d'),
            color: '16, 185, 129', // Emerald
            stats: { energy: 60, bravery: 90, appetite: 10, intel: 98, affection: 20 },
            pulse: 0
        };
        const labels = ['⚡活力', '🛡️胆量', '🍖食欲', '🧠智力', '💕粘人'];

        function drawRadar() {
            const canvas = document.getElementById('piRadar'); const ctx = pi.ctx;
            const centerX = canvas.width/2; const centerY = canvas.height/2; const radius = 65;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            ctx.strokeStyle = 'rgba(100, 116, 139, 0.4)'; ctx.lineWidth = 1;
            for (let j=1; j<=5; j++) {
                ctx.beginPath();
                for (let i=0; i<5; i++) {
                    const angle = (Math.PI*2*i)/5 - Math.PI/2;
                    const x = centerX + Math.cos(angle)*(radius*j/5); const y = centerY + Math.sin(angle)*(radius*j/5);
                    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                }
                ctx.closePath(); ctx.stroke();
            }
            
            ctx.fillStyle = '#64748b'; ctx.font = '10px Courier New'; ctx.textAlign = 'center';
            for (let i=0; i<5; i++) {
                const angle = (Math.PI*2*i)/5 - Math.PI/2;
                ctx.fillText(labels[i], centerX + Math.cos(angle)*(radius+18), centerY + Math.sin(angle)*(radius+18));
            }

            ctx.beginPath();
            const values = Object.values(pi.stats);
            for (let i=0; i<5; i++) {
                const angle = (Math.PI*2*i)/5 - Math.PI/2;
                const r = (values[i]/100)*radius + (Math.sin(pi.pulse)*1.5);
                const x = centerX + Math.cos(angle)*r; const y = centerY + Math.sin(angle)*r;
                if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(${pi.color}, 0.3)`; ctx.fill();
            ctx.strokeStyle = `rgb(${pi.color})`; ctx.lineWidth = 2; ctx.stroke();
            pi.pulse += 0.05;
            requestAnimationFrame(drawRadar);
        }
        drawRadar();

        // 操作 2：注入科学真理
        function injectOracle() {
            if(!isAudioReady) { alert("请先激活声学监听"); return; }
            document.getElementById('btnOracle').style.opacity = '0.5';
            document.getElementById('btnOracle').style.pointerEvents = 'none';
            
            playDataInject();
            log("📚 [真理注入] 挂载外部知识库：Sion AI 极化力场数据 & 湿实验协议...", "#f59e0b");
            log("⚙️ [TDOG 引擎] 解析完成。实验模组分配至 SSSU 阵列...", "#f59e0b");

            // 反应釜节点 (中心节点) 温度准备
            sssuNodes[4].targetTemp = 18.0; 
            
            setTimeout(() => {
                log("✅ [就绪] 14 维物理场受控。可以移交 PI 启动实验。", "#10b981");
                document.getElementById('btnExp').classList.add('active');
            }, 1500);
        }

        // 操作 3：启动湿实验
        function triggerDBTL() {
            document.getElementById('btnExp').classList.remove('active');
            log("==================================================", "#10b981");
            log("👨‍🔬 [PI 指令] Alpha_PI_Sion: '接管反应釜。启动 DBTL 生物发酵循环，目标温度 35℃。'", "#10b981");

            // 反应釜剧烈升温
            sssuNodes[4].targetTemp = 35.0;
            sssuNodes[4].entropy = 0.85;

            // 周边节点受到热力学扩散影响
            setTimeout(() => {
                [1,3,5,7].forEach(i => { sssuNodes[i].targetTemp = 22.0; sssuNodes[i].entropy = 0.4; });
                log("🌪️ [大爆炸引擎] 流体力学结算：中心发酵舱热辐射扩散，周边 SSSU 空间熵升高。", "#38bdf8");
            }, 1000);

            // PI 的智力与活力发生反应
            setTimeout(() => {
                pi.stats.energy = 90; // 全力运转
                log("🧠 [PI 意识流] '观测到发酵代谢产物剧增，分子动力学极化场稳态保持。我正在实时修正 BPL 指令。'", "#10b981");
                playDataInject(); // 模拟数据大量产出
            }, 2500);
            
            // 实验平抑收尾
            setTimeout(() => {
                sssuNodes[4].targetTemp = 15.0; // 冷却
                [1,3,5,7].forEach(i => { sssuNodes[i].targetTemp = 12.0; sssuNodes[i].entropy = 0.15; });
                pi.stats.energy = 60; // 恢复待机
                log("✅ [实验闭环] 菌株开发第一阶段结束。物理场温度正在回落基态。已生成下轮方案。", "#f8fafc");
            }, 6000);
        }
    </script>
</body>
</html>
